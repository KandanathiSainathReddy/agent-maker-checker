# Local run for the whole stack. This file lives in infra/, so build contexts and
# mounts are relative to the repo root via ../ . Bring it up with:
#   docker compose -f infra/docker-compose.yml up
services:
  # THE PRODUCT — FastAPI enforcement proxy + policy engine.
  # Local run uses in-memory state + JSONL audit (single process → bulletproof, no AWS).
  proxy:
    build: ../amplify/functions/proxy
    ports:
      - "${PROXY_PORT:-8000}:8000"
    env_file: ../.env
    environment:
      - STATE_BACKEND=${STATE_BACKEND:-memory}
      - AUDIT_BACKEND=${AUDIT_BACKEND:-jsonl}
      - POLICY_DIR=/app/proxy/policies
      - PROXY_ENABLE_CORS=1   # browser (dashboard) calls this cross-origin locally
    volumes:
      - ../amplify/functions/proxy/policies:/app/proxy/policies:ro  # hot-reload without rebuild
      - ../data:/app/data
    depends_on:
      - razorpay-mcp

  # Razorpay's open-source MCP server (Go), self-hosted, test-mode keys.
  # Transport is stdio ONLY — razorpay-mcp-server has exactly one subcommand
  # (`stdio`; no sse/http), confirmed against its cmd/ source and its own
  # Dockerfile ENTRYPOINT — so there is no port to publish. A stdio MCP
  # server is a subprocess protocol, not a network daemon: the actual live
  # connection is the proxy's mcp_client.py spawning its own short-lived
  # `docker run --rm -i ... <image>` (or a local binary — see
  # RAZORPAY_MCP_BIN/RAZORPAY_MCP_ARGS) per call, NOT this container. Under
  # `docker compose up` this service starts, gets stdin EOF immediately, and
  # exits 0 — harmless. It's kept here so the image is declared/pinned and
  # `docker compose run --rm razorpay-mcp` works for manual stdio testing.
  # Docker Hub publishes only commit-hash tags for razorpay/mcp (no `latest`,
  # no semver) — override RAZORPAY_MCP_IMAGE if the pinned tag is pruned.
  # Full research trail + our-tool -> server-tool mapping: infra/razorpay-mcp.md
  razorpay-mcp:
    image: ${RAZORPAY_MCP_IMAGE:-razorpay/mcp:8607a4d95e67c86db8201d728658eb5f00d790fe}
    environment:
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    stdin_open: true
    tty: false
    restart: "no"

  # DynamoDB Local — mirrors the cloud state/audit backend so the concurrency test
  # exercises real atomic semantics (not a mock). Host port 8001 → container 8000.
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8001:8000"

  # Nova playground agent — wraps the Bedrock (Amazon Nova) tool-loop agent as an
  # HTTP service; its tool calls go through the proxy. Bedrock needs AWS creds:
  # export AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (+ AWS_SESSION_TOKEN if using
  # temporary creds) or add them to .env before `docker compose up`.
  agent:
    build: ../amplify/functions/agent
    ports:
      - "8100:8100"
    env_file: ../.env
    environment:
      - PROXY_URL=http://proxy:8000
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-us.amazon.nova-lite-v1:0}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
    depends_on:
      - proxy

  # React dashboard (Vite) — decision feed, HITL queue, live counters, Nova playground.
  dashboard:
    build: ../apps/dashboard
    ports:
      - "3000:3000"
    environment:
      # Browser-reachable host ports — the dashboard runs in YOUR BROWSER, not in
      # the compose network, so it must use localhost:<published port>, not the
      # service name. The dashboard image's entrypoint injects these as
      # window.__PROXY_URL__ / window.__AGENT_URL__.
      - PROXY_URL=http://localhost:8000
      - AGENT_URL=http://localhost:8100
    depends_on:
      - proxy
      - agent
