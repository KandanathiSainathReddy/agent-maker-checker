# Minimal static-file server for the built dashboard (dist/), listening on
# :3000 to match docker-compose.yml's `dashboard` service port mapping.
server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single static page — no client-side routing, so unmatched paths (like a
    # missing amplify_outputs.json) should 404 rather than fall back to
    # index.html, matching how Amplify Hosting serves static files.
    location / {
        try_files $uri =404;
    }

    # Never cache the runtime-injected proxy URL.
    location = /env-config.js {
        add_header Cache-Control "no-store";
    }
}
