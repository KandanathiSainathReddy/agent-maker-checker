version: 1
# agent-maker-checker — single-app Amplify Gen 2 build spec (CONTRACTS.md §6/§7).
#
# Two `applications` entries share one Amplify App:
#   1. appRoot: .              — synthesizes + deploys amplify/backend.ts
#                                 (the 3 DynamoDB tables + the proxy container
#                                 Lambda), emits amplify_outputs.json.
#   2. appRoot: apps/dashboard — builds the Vite dashboard, which reads
#                                 amplify_outputs.json -> custom.proxyUrl at
#                                 build/runtime to find the live proxy.
#
# Mirrors CloudMorph's amplify.yml `applications:` array, simplified: no
# shared shell script (CloudMorph's scripts/amplify-app.sh) — this repo only
# has one frontend, so the commands are inlined directly below.
applications:
  - appRoot: .
    env:
      variables:
        # REQUIRED — fill in before the first deploy. Find it in the Amplify
        # Console URL (console.aws.amazon.com/amplify/apps/<THIS_VALUE>) after
        # running `amplify app create` / creating the app via the console.
        # `ampx pipeline-deploy` needs it to know which Amplify App + branch
        # backend to target.
        BACKEND_APP_ID: "REPLACE_WITH_AMPLIFY_APP_ID"
    backend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $BACKEND_APP_ID
      artifacts:
        baseDirectory: .
        files:
          - amplify_outputs.json
    frontend:
      # No frontend build in the backend app entry — Amplify still requires
      # this section to exist so amplify_outputs.json (written by the backend
      # phase above) is captured as an artifact and made available to the
      # apps/dashboard app entry below.
      phases:
        preBuild:
          commands:
            - "true"
        build:
          commands:
            - "true"
      artifacts:
        baseDirectory: .
        files:
          - amplify_outputs.json

  - appRoot: apps/dashboard
    env:
      variables:
        BACKEND_APP_ID: "REPLACE_WITH_AMPLIFY_APP_ID"
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        # Vite's default build output directory.
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    # SPA rewrite: any path without a file extension falls back to
    # index.html so client-side routing works on refresh/deep links.
    customRules:
      - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
        target: /index.html
        status: 200
