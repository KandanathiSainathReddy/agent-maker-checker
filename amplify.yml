version: 1
# agent-maker-checker — single fullstack Amplify Gen 2 build spec.
#
# One Amplify app (connected at repo root) builds both tiers in one job:
#   backend  — synthesizes + deploys amplify/backend.ts via `ampx pipeline-deploy`
#              (3 on-demand DynamoDB tables + the proxy container Lambda) and
#              writes amplify_outputs.json (incl. custom.proxyUrl) at repo root.
#   frontend — builds the Vite dashboard workspace and ships amplify_outputs.json
#              alongside it so the page can find the live proxy and flip its
#              badge to LIVE (falls back to simulated mode if absent).
#
# $AWS_APP_ID and $AWS_BRANCH are provided by Amplify's build environment —
# no placeholders to fill.
backend:
  phases:
    build:
      commands:
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        # node_modules persists from the backend phase in the same build
        # container; install only if the backend phase didn't run.
        - '[ -d node_modules ] || npm ci'
    build:
      commands:
        - npm run build:dashboard
        - cp amplify_outputs.json apps/dashboard/dist/amplify_outputs.json
  artifacts:
    baseDirectory: apps/dashboard/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
