name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: amplify/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install ruff -r proxy/requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        # The DynamoDB concurrency gate skips here (no DynamoDB Local in CI); the
        # in-memory concurrency variant always runs. Run the real gate locally:
        #   docker compose -f infra/docker-compose.yml up -d dynamodb-local && pytest -q
        run: pytest -q
