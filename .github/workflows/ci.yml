name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install ruff pytest
          if [ -f proxy/requirements.txt ]; then pip install -r proxy/requirements.txt; fi
      - name: Lint
        run: ruff check .
      - name: Test
        # exit code 5 = no tests collected (allowed only until Phase 1 lands)
        run: pytest -q tests/ || [ $? -eq 5 ]
