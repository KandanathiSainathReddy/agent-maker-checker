[pytest]
; amplify/functions on sys.path so `proxy.*` imports resolve the same way in
; tests as in the container (PYTHONPATH=/app, uvicorn proxy.app:app). The proxy
; package lives at amplify/functions/proxy/; run pytest from amplify/functions/.
pythonpath = .
testpaths = proxy/tests
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
